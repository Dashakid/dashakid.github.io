<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian-Carlo Javier | AI Automation Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ec4899; --secondary: #a855f7; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; padding: 5rem 1rem; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; margin-bottom: 1.5rem; box-shadow: 0 0 20px rgba(236, 72, 153, 0.3); }
        h1 { font-size: 3rem; margin: 0; font-weight: 800; }
        .tagline { color: var(--primary); font-size: 1.2rem; font-weight: 600; margin-top: 5px; }
        .container { max-width: 1100px; width: 90%; padding: 4rem 0; }
        
        /* Section Styling */
        h2 { font-size: 1.8rem; margin-bottom: 2rem; color: #fff; border-left: 4px solid var(--primary); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; margin-bottom: 4rem; }
        .card { background: var(--card-bg); border: 1px solid #334155; border-radius: 20px; padding: 2rem; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        
        /* Skills Toolbox */
        .skills-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 4rem; }
        .skill-badge { background: #334155; color: #fff; padding: 8px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; border: 1px solid transparent; }
        .skill-badge:hover { border-color: var(--secondary); color: var(--primary); }

        .tag { background: #0f172a; padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; margin-right: 5px; color: var(--primary); font-weight: bold; }
        .btn { display: inline-block; background: var(--primary); color: white; padding: 0.7rem 1.5rem; border-radius: 10px; text-decoration: none; font-weight: 600; margin-top: 1.5rem; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        footer { padding: 4rem; text-align: center; color: var(--text-dim); border-top: 1px solid #334155; width: 100%; }
        .contact-link { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <img src="me.jpg" alt="Gian-Carlo Javier" class="profile-pic">
        <h1>Gian-Carlo Javier</h1>
        <div class="tagline">AI Automation Engineer & Data Scientist</div>
        <p style="color: var(--text-dim); max-width: 600px; margin: 1.5rem auto;">
            Engineering high-performance ML pipelines, custom AI Orchestrators, and automated financial workflows. Remote 💻
        </p>
