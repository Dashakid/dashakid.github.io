<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian-Carlo Javier | AI Automation Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4899; /* Pink */
            --secondary: #a855f7; /* Purple */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hero Section */
        header {
            width: 100%;
            padding: 5rem 1rem;
            text-align: center;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.2);
        }

        h1 { font-size: 3rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .tagline { color: var(--primary); font-size: 1.2rem; font-weight: 600; margin-top: 0.5rem; }
        .bio { max-width: 600px; margin: 1.5rem auto; color: var(--text-dim); }

        /* Project Section */
        .container { max-width: 1100px; width: 90%; padding: 4rem 0; }
        h2 { font-size: 2rem; margin-bottom: 2rem; border-left: 5px solid var(--secondary); padding-left: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card h3 { margin-top: 0; color: #fff; font-size: 1.5rem; }
        .card p { color: var(--text-dim); flex-grow: 1; }

        .tech-stack { margin: 1rem 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            background: #334155;
            color: #e2e8f0;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn {
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            text-align: center;
        }
